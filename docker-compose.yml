postgres:
  image: postgres:16-alpine
  environment:
    - POSTGRES_DB=address_parse
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres
  volumes:
    - ./data/postgres:/var/lib/postgresql/data
    - ./migrations:/docker-entrypoint-initdb.d
  ports:
    - "5432:5432"

redis:
  image: redis:7-alpine
  ports:
    - "6379:6379"
  volumes:
    - ./data/redis:/data

app:
  build: .
  ports:
    - "8080:8080"
  env_file:
    - .env
  volumes:
    - ./migrations:/docker-entrypoint-initdb.d
  links:
    - postgres
    - redis
